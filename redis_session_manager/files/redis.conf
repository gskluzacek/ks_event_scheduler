# redis.conf
# Persistence: AOF (primary) + RDB (backup snapshot)
# ---------------------------------------------------

# ── Network ──────────────────────────────────────────────────────────────────
bind 0.0.0.0
port 6379
# No password needed — docker network is the perimeter.
# Set requirepass if you ever expose Redis outside the container.
protected-mode no

# ── RDB snapshots (backup) ───────────────────────────────────────────────────
# Save a full snapshot if at least N keys changed in M seconds.
# These are layered: whichever condition triggers first wins.
# after 15 min if ≥1 key changed
save 900 1
# after 5 min if ≥10 keys changed
save 300 10
# after 1 min if ≥10 000 keys changed
save 60 10000

dbfilename dump.rdb
# /data is the mounted host volume — survives container restarts
dir /data

# ── AOF (primary crash-recovery log) ────────────────────────────────────────
appendonly yes
appendfilename "appendonly.aof"
# Flush to disk once per second — at most ~1s of loss on Ctrl-C or kill <pid>
appendfsync everysec

# Rewrite the AOF in the background when it grows too large
auto-aof-rewrite-percentage 100
auto-aof-rewrite-min-size 64mb

# Hybrid format: fast RDB load + AOF tail for recency
aof-use-rdb-preamble yes

# ── Memory ───────────────────────────────────────────────────────────────────
# Optional: cap memory so Redis never starves the bot process.
# Adjust to your host's available RAM.
# maxmemory 256mb
# maxmemory-policy allkeys-lru

# ── Logging ──────────────────────────────────────────────────────────────────
loglevel notice
# Empty string = log to stdout, captured by docker logs
logfile ""
